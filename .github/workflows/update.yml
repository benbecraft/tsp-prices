name: Update TSP prices

# Runs on GitHub's servers (no browser, no CORS limit). Fetches the public TSP
# share prices and commits prices.json, which GitHub serves with CORS headers
# so the app can read it from anywhere.

on:
  schedule:
    # TSP posts the day's share prices after U.S. market close. These run in UTC.
    # Two attempts (evening + late) so we reliably catch the day's update.
    - cron: '30 23 * * 1-5'   # ~6:30/7:30 PM ET, weekdays
    - cron: '30 2  * * 2-6'   # ~9:30/10:30 PM ET (next UTC day), weekdays
  workflow_dispatch:           # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: tsp-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest TSP prices
        run: python fetch_tsp.py

      - name: Commit prices.json if it changed
        run: |
          git config user.name  "tsp-price-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --cached --quiet; then
            echo "No price change today."
          else
            git commit -m "Update TSP prices ($(date -u +%F))"
            git push
          fi
